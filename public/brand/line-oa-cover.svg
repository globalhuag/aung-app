<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="878" viewBox="0 0 1080 878">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2B3FBE"/>
      <stop offset="1" stop-color="#1A2980"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="878" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="120" cy="140" r="220" fill="#ffffff" opacity="0.04"/>
  <circle cx="1000" cy="780" r="260" fill="#ffffff" opacity="0.04"/>
  <circle cx="950" cy="160" r="80" fill="#C9A84C" opacity="0.12"/>

  <!-- Logo A mark (centered top) -->
  <g transform="translate(440,80)" filter="url(#shadow)">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <path fill="#ffffff" fill-rule="evenodd"
        d="M 100 15 L 106 18 L 142 95 L 160 95 C 172 95 184 99 188 108 C 184 105 176 103 166 107 L 155 112 L 182 178 C 183 183 178 186 172 183 C 166 180 158 178 148 180 L 140 180 L 118 128 L 82 128 L 60 180 L 52 180 C 42 178 34 180 28 183 C 22 186 17 183 18 178 L 45 112 L 34 107 C 24 103 16 105 12 108 C 16 99 28 95 40 95 L 58 95 L 94 18 Z M 100 55 L 82 95 L 118 95 Z"/>
    </svg>
  </g>

  <!-- Wordmark "Aung" -->
  <text x="540" y="360" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="120" font-weight="900" fill="#ffffff"
        letter-spacing="4">Aung</text>

  <!-- Burmese "အောင်" -->
  <text x="540" y="412" text-anchor="middle"
        font-family="Noto Sans Myanmar, Myanmar Text, sans-serif"
        font-size="42" fill="#ffffff" opacity="0.7">အောင်</text>

  <!-- Divider -->
  <line x1="440" y1="448" x2="640" y2="448" stroke="#C9A84C" stroke-width="3"/>

  <!-- Tagline -->
  <text x="540" y="498" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="22"
        fill="#ffffff" opacity="0.85" letter-spacing="2">
    SUPER APP · แรงงานพม่าในไทย
  </text>
  <text x="540" y="528" text-anchor="middle"
        font-family="Noto Sans Myanmar, Myanmar Text, sans-serif"
        font-size="20" fill="#ffffff" opacity="0.7">
    မြန်မာ အလုပ်သမား
  </text>

  <!-- Two service pills -->
  <!-- Pill 1: Resume -->
  <g transform="translate(140,620)">
    <rect width="360" height="130" rx="20" fill="#ffffff" opacity="0.12"/>
    <rect width="360" height="130" rx="20" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <text x="30" y="58" font-family="Arial, sans-serif" font-size="46">📄</text>
    <text x="90" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">สร้างเรซูเม่</text>
    <text x="90" y="88" font-family="Noto Sans Myanmar, Myanmar Text, sans-serif" font-size="18" fill="#ffffff" opacity="0.8">ကိုယ်ရေးဖြည့်</text>
    <text x="90" y="114" font-family="Arial, sans-serif" font-size="14" fill="#C9A84C" letter-spacing="1">AI SUIT + PRINT</text>
  </g>

  <!-- Pill 2: 90-day report -->
  <g transform="translate(580,620)">
    <rect width="360" height="130" rx="20" fill="#ffffff" opacity="0.12"/>
    <rect width="360" height="130" rx="20" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <text x="30" y="58" font-family="Arial, sans-serif" font-size="46">📋</text>
    <text x="90" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">รายงานตัว 90 วัน</text>
    <text x="90" y="88" font-family="Noto Sans Myanmar, Myanmar Text, sans-serif" font-size="18" fill="#ffffff" opacity="0.8">၉၀ ရက် အစီရင်ခံ</text>
    <text x="90" y="114" font-family="Arial, sans-serif" font-size="14" fill="#C9A84C" letter-spacing="1">TM47 AUTO-FORM</text>
  </g>

  <!-- Bottom URL -->
  <text x="540" y="830" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="14"
        fill="#ffffff" opacity="0.45" letter-spacing="4">
    aung-app.vercel.app
  </text>
</svg>
